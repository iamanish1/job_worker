version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobworker-db
    environment:
      POSTGRES_DB:       jobworker
      POSTGRES_USER:     jobworker
      POSTGRES_PASSWORD: jobworker123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobworker -d jobworker"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobworker-api
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL:  jdbc:postgresql://postgres:5432/jobworker
      DB_USER: jobworker
      DB_PASS: jobworker123
      # Add these in .env file (never commit secrets):
      JWT_SECRET:             ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      AWS_REGION:             ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET:          ${AWS_S3_BUCKET:-job-worker-files}
      AWS_ACCESS_KEY:         ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY:         ${AWS_SECRET_KEY:-}
      FIREBASE_CREDENTIALS_PATH: firebase-service-account.json
      VERIFICATION_PROVIDER:  ${VERIFICATION_PROVIDER:-sandbox}
      SUREPASS_BASE_URL:      ${SUREPASS_BASE_URL:-https://kyc-api.surepass.io}
      SUREPASS_TOKEN:         ${SUREPASS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src/main/resources/firebase-service-account.json:/app/resources/firebase-service-account.json:ro
    restart: unless-stopped

volumes:
  postgres_data:
