spring:
  application:
    name: job-worker-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobworker}
    username: ${DB_USER:jobworker}
    password: ${DB_PASS:jobworker123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    access-token-expiry-ms: 3600000        # 1 hour
    refresh-token-expiry-ms: 2592000000    # 30 days

  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

  auth:
    fallback-otp:
      enabled: ${AUTH_FALLBACK_OTP_ENABLED:false}
      code: ${AUTH_FALLBACK_OTP_CODE:98737}

  aws:
    region: ${AWS_REGION:ap-south-1}
    s3-bucket: ${AWS_S3_BUCKET:job-worker-files}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}

  booking:
    expiry-minutes: 30

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081,exp://localhost:8081,http://localhost:19006}

verification:
  # Options: sandbox (mock) | surepass (real KYC)
  # sandbox: OTP is always "123456", face match always succeeds.
  # surepass: calls Surepass KYC API with real Aadhaar + face biometrics.
  provider: ${VERIFICATION_PROVIDER:sandbox}

surepass:
  api:
    base-url: ${SUREPASS_BASE_URL:https://kyc-api.surepass.io}
    token: ${SUREPASS_TOKEN:}

logging:
  level:
    com.marketplace: DEBUG
    org.springframework.security: INFO
